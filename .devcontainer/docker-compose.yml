services:
  curso:
    build:
      dockerfile: Dockerfile
    image: tab_news
    ports:
      - "8080:8080"
      - "3000:3000"
    volumes:
      - type: bind
        source: /run/media/daniel/projects/projects/curso.dev
        target: /curso.dev

  database:
    image: "postgres:16.0-alpine3.18"
    environment:
      POSTGRES_PASSWORD: "PASSWORD"
    ports:
      - "5432:5432"
